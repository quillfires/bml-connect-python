name: Auto Version Bump and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    name: Version bump and release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    environment:
      name: pypi
      url: https://pypi.org/project/bml-connect-python/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-in-project: true

      - name: Pull latest main
        run: git pull --rebase origin main

      # ── Determine bump type ─────────────────────────────────────────────────
      - name: Determine bump type
        id: bump
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qi "major\|breaking"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qi "minor\|feat"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # ── Bump version ────────────────────────────────────────────────────────
      - name: Bump version
        id: version
        run: |
          poetry version ${{ steps.bump.outputs.type }}
          echo "new_version=$(poetry version --short)" >> "$GITHUB_OUTPUT"

      # ── Update CHANGELOG ────────────────────────────────────────────────────
      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          DATE=$(date -u +%Y-%m-%d)
          COMMIT_MSG=$(git log -1 --format="%B" HEAD~1)

          [ -f CHANGELOG.md ] || printf "# Changelog\n\nAll notable changes to this project will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n" > CHANGELOG.md

          if grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "Changelog already contains version ${VERSION}, skipping"
          else
            head -n 6 CHANGELOG.md > CHANGELOG.tmp
            echo "" >> CHANGELOG.tmp
            echo "## [${VERSION}] - ${DATE}" >> CHANGELOG.tmp
            echo "" >> CHANGELOG.tmp
            echo "### Changes" >> CHANGELOG.tmp
            echo "$COMMIT_MSG" | grep -v '^$' | head -5 | sed 's/^/- /' >> CHANGELOG.tmp
            echo "" >> CHANGELOG.tmp
            tail -n +7 CHANGELOG.md >> CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          fi

      # ── Regenerate requirements ─────────────────────────────────────────────
      - name: Regenerate requirements
        run: |
          if [ -f requirements.txt ]; then
            poetry export -f requirements.txt --without-hashes -o requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            poetry export -f requirements.txt --with dev --without-hashes -o requirements-dev.txt
          fi

      # ── Commit ──────────────────────────────────────────────────────────────
      - name: Commit changes
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          git add pyproject.toml CHANGELOG.md
          [ -f requirements.txt ]     && git add requirements.txt     || true
          [ -f requirements-dev.txt ] && git add requirements-dev.txt || true
          git commit -m "chore(release): v${VERSION} [skip ci]" || echo "No changes to commit"

      # ── Push commit and tag ─────────────────────────────────────────────────
      - name: Push commit and tag
        run: |
          TAG="v${{ steps.version.outputs.new_version }}"

          git push origin main

          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Stale tag ${TAG} found - deleting"
            git push origin --delete "${TAG}" || true
          fi

          git tag "${TAG}"
          git push origin "${TAG}"

      # ── Run tests before publishing ─────────────────────────────────────────
      - name: Install dependencies for test
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest -v

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build distribution
        run: poetry build

      # ── Publish to PyPI ─────────────────────────────────────────────────────
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Extract changelog notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new_version }}"
          name: "v${{ steps.version.outputs.new_version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.new_version, 'a') || contains(steps.version.outputs.new_version, 'b') || contains(steps.version.outputs.new_version, 'rc') }}
