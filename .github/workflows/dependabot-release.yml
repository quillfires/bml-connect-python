name: Auto Patch Release (Dependabot)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  dependabot_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install project dependencies
        run: poetry install --no-interaction

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Check if last merged PR was Dependabot
        id: dependabot_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the most recent closed PR targeting main
          LAST_PR=$(gh pr list -B main -s closed --limit 1 --json number --jq '.[0].number')
          
          # Verify that it was merged
          MERGED=$(gh pr view $LAST_PR --json merged --jq '.merged')
          if [ "$MERGED" != "true" ]; then
            echo "IS_DEPENDABOT=false" >> $GITHUB_ENV
            echo "No merged Dependabot PR found."
            exit 0
          fi

          # Get the PR author login
          PR_AUTHOR=$(gh pr view $LAST_PR --json author --jq '.author.login')
          echo "PR_AUTHOR=$PR_AUTHOR"
          if [[ "$PR_AUTHOR" == "dependabot"* ]]; then
            echo "IS_DEPENDABOT=true" >> $GITHUB_ENV
          else
            echo "IS_DEPENDABOT=false" >> $GITHUB_ENV
          fi

      - name: Bump patch version and export requirements
        if: env.IS_DEPENDABOT == 'true'
        id: bump
        run: |
          NEW_VERSION=$(poetry version patch | awk '{print $2}')
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          # Regenerate requirements.txt files from Poetry
          poetry export -f requirements.txt --without-hashes > requirements.txt
          poetry export -f requirements.txt --dev --without-hashes > requirements-dev.txt

      - name: Update CHANGELOG.md
        if: env.IS_DEPENDABOT == 'true'
        run: |
          if ! grep -q "$NEW_VERSION" CHANGELOG.md; then
            # Keep first 8 lines (header)
            head -n 8 CHANGELOG.md > tmp_changelog.md

            # Add new version header
            echo "" >> tmp_changelog.md
            echo "## [$NEW_VERSION] - $(date +'%Y-%m-%d')" >> tmp_changelog.md

            # Only Dependabot PR titles
            git log --merges origin/main..HEAD --pretty=format:"%s (%h)" \
              | grep -i "Bump" \
              | sed 's/^/- /' >> tmp_changelog.md

            echo "" >> tmp_changelog.md

            # Append remaining old changelog from line 9 onward
            tail -n +9 CHANGELOG.md >> tmp_changelog.md

            mv tmp_changelog.md CHANGELOG.md
          fi

      - name: Commit version, requirements, and changelog
        if: env.IS_DEPENDABOT == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml requirements.txt requirements-dev.txt CHANGELOG.md
          git commit -m "chore(release): $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Create tag for release
        if: env.IS_DEPENDABOT == 'true'
        run: |
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
