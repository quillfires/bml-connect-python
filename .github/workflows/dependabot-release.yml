name: Auto Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-version-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest

    # Prevent loop from version commits
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-in-project: true

      - name: Sync main
        run: git pull --rebase origin main

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -qi "minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          poetry version ${{ steps.bump.outputs.type }}
          echo "version=$(poetry version --short)" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          DATE=$(date -u +%Y-%m-%d)
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          [ -f CHANGELOG.md ] || printf "# Changelog\n\nAll notable changes to this project will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n" > CHANGELOG.md
          if grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "Changelog already contains version ${VERSION}, skipping"
          else
            NEW_BLOCK="## [${VERSION}] - ${DATE}\n\n### Changes\n- ${COMMIT_MSG}\n\n"
            head -n 6 CHANGELOG.md > CHANGELOG.tmp
            echo "" >> CHANGELOG.tmp
            printf "$NEW_BLOCK" >> CHANGELOG.tmp
            tail -n +7 CHANGELOG.md >> CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          fi

      - name: Regenerate requirements
        run: |
          if [ -f requirements.txt ]; then
            poetry export -f requirements.txt --without-hashes -o requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            poetry export -f requirements.txt --with dev --without-hashes -o requirements-dev.txt
          fi

      - name: Commit changes
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"

          git add pyproject.toml CHANGELOG.md

          [ -f requirements.txt ] && git add requirements.txt || true
          [ -f requirements-dev.txt ] && git add requirements-dev.txt || true

          git commit -m "chore: bump version to v${VERSION} [skip ci]" || exit 0

          git push origin main

      - name: Push commit and tag
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          TAG="v${VERSION}"

          git push origin main

          # Prevent duplicate tag issues
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            git push origin --delete "${TAG}" || true
          fi

          git tag "${TAG}"
          git push origin "${TAG}"
