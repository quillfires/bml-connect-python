name: Auto Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-version-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"

      - name: Sync
        run: git pull --rebase origin main

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -qi "minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          poetry version ${{ steps.bump.outputs.type }}
          VERSION=$(poetry version --short)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)
          MSG="${{ github.event.head_commit.message }}"

          [ -f CHANGELOG.md ] || printf "# Changelog\n\n" > CHANGELOG.md

          NEW_BLOCK="## [${VERSION}] - ${DATE}\n\n### Changes\n- ${MSG}\n\n"

          head -n 8 CHANGELOG.md > CHANGELOG.tmp || true
          echo "" >> CHANGELOG.tmp
          printf "$NEW_BLOCK" >> CHANGELOG.tmp
          tail -n +9 CHANGELOG.md >> CHANGELOG.tmp 2>/dev/null || true
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit changes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git add pyproject.toml CHANGELOG.md

          git commit -m "chore: bump version to v${VERSION} [skip ci]" || exit 0

      - name: Push commit
        run: |
          set -e
          git push origin main

      - name: Create tag (IMPORTANT FIX)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          sleep 120

          git tag -f "$TAG"
          git push origin "$TAG"
