name: Auto Minor Release (Dependabot)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  dependabot_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.5"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install project dependencies
        run: poetry install --no-interaction

      - name: Check if last commit is Dependabot
        id: dependabot_check
        run: |
          AUTHOR=$(git log -1 --pretty=format:"%an")
          echo "AUTHOR=$AUTHOR"
          if [[ "$AUTHOR" == "dependabot"* ]]; then
            echo "IS_DEPENDABOT=true" >> $GITHUB_ENV
          else
            echo "IS_DEPENDABOT=false" >> $GITHUB_ENV
          fi

      - name: Bump patch version and export requirements
        if: env.IS_DEPENDABOT == 'true'
        id: bump
        run: |
          NEW_VERSION=$(poetry version patch | awk '{print $2}')
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          # Regenerate requirements.txt files from Poetry
          poetry export -f requirements.txt --without-hashes > requirements.txt
          poetry export -f requirements.txt --dev --without-hashes > requirements-dev.txt

      - name: Update CHANGELOG.md
        if: env.IS_DEPENDABOT == 'true'
        run: |
          if ! grep -q "$NEW_VERSION" CHANGELOG.md; then
            echo "## $NEW_VERSION - $(date +'%Y-%m-%d')" > tmp_changelog.md
            # Only Dependabot PR titles
            git log --merges origin/main..HEAD --pretty=format:"%s (%h)" \
              | grep -i "Bump" \
              | sed 's/^/- /' >> tmp_changelog.md
            echo "" >> tmp_changelog.md
            cat CHANGELOG.md >> tmp_changelog.md
            mv tmp_changelog.md CHANGELOG.md
          fi

      - name: Commit version, requirements, and changelog
        if: env.IS_DEPENDABOT == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml requirements.txt requirements-dev.txt CHANGELOG.md
          git commit -m "chore(release): $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Create tag for release
        if: env.IS_DEPENDABOT == 'true'
        run: |
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
